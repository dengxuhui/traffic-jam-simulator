<!DOCTYPE html>

<style>
:root{--bg:#060a10;--bg2:#0d1219;--bg3:#151b24;--bg4:#1b2430;--tx:#e6edf3;--tx2:#8b949e;--c1:#2f81f7;--c2:#3fb950;--c3:#f85149;--c4:#f1a933;--c5:#0ea5e9;--bd:#2b3440;--gl:rgba(255,255,255,.05)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;background-image:radial-gradient(ellipse at 20% 10%,rgba(47,129,247,.08) 0%,transparent 45%),radial-gradient(ellipse at 70% 85%,rgba(14,165,233,.06) 0%,transparent 50%),linear-gradient(180deg,rgba(10,14,20,.7),rgba(6,10,16,.9));background-attachment:fixed}
.h{padding:16px 24px;background:linear-gradient(180deg,rgba(12,16,22,.98),rgba(12,16,22,.6));border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:99;backdrop-filter:blur(10px)}
.hc{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.l{display:flex;align-items:center;gap:12px}
.li{width:34px;height:34px;background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 8px 18px rgba(0,0,0,.35)}

.rt{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--tx2);background:rgba(6,10,16,.6);border:1px solid var(--bd);padding:6px 10px;border-radius:999px}
.rt b{color:var(--c2);font-weight:600}
.m{position:relative;display:block;padding:16px;max-width:1600px;margin:0 auto}
.s1{background:var(--bg2);border-radius:16px;border:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 18px 40px rgba(0,0,0,.35)}
.cw{position:relative;background:linear-gradient(180deg,#080c12 0%,#0d141a 50%,#080c12 100%);flex:1;min-height:calc(100vh - 140px);height:calc(100vh - 140px);overflow-y:auto}

.bg{display:flex;gap:8px}
.b{padding:8px 16px;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:inherit;box-shadow:0 6px 14px rgba(0,0,0,.3)}

.b:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bp{background:linear-gradient(135deg,var(--c2),#238636);color:#fff}
.bs{background:linear-gradient(135deg,var(--c4),#9e6a03);color:#fff}

.lg{display:flex;gap:10px}
.li{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--tx2)}
.ld{width:8px;height:8px;border-radius:2px}

.pc{padding:12px}
.cg{margin-bottom:12px}

.cl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:.75rem;color:var(--tx2)}
.cv{font-family:'JetBrains Mono',monospace;color:var(--c1);font-weight:600;font-size:.8rem}
input[type=range]{width:100%;height:5px;-webkit-appearance:none;background:var(--bg4);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--c1);border-radius:50%;cursor:pointer}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p .sg{grid-template-columns:repeat(5,1fr)}
.sp .sg{grid-template-columns:1fr 1fr}
.sb{background:var(--bg4);border-radius:6px;padding:10px;text-align:center}
.sv{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--c1)}
.sl{font-size:.55rem;color:var(--tx2);margin-top:2px;text-transform:uppercase}
.vs{max-height:180px;overflow-y:auto}
.vs::-webkit-scrollbar{width:4px}
.vs::-webkit-scrollbar-track{background:var(--bg4)}
.vs::-webkit-scrollbar-thumb{background:var(--c1);border-radius:2px}
.vc{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:4px;background:var(--bg4);border-radius:8px;cursor:pointer;transition:all .1s;border:2px solid transparent}
.vc:hover{background:rgba(47,129,247,.08)}
.vc.sel{border-color:var(--c1);background:rgba(47,129,247,.12)}
.vi{width:28px;height:16px;border-radius:3px;position:relative}
.vi::after{content:'';position:absolute;top:2px;left:2px;right:2px;height:5px;background:rgba(255,255,255,.2);border-radius:2px 2px 0 0}
.vif{flex:1}
.vid{font-size:.8rem;font-weight:500}
.vsp{font-size:.65rem;color:var(--tx2);font-family:'JetBrains Mono',monospace}
.sp{display:none}
.sp.on{display:block}
.st{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.stb{padding:6px;border:2px solid var(--bg4);border-radius:4px;background:0 0;color:var(--tx2);cursor:pointer;transition:all .1s;font-size:.65rem;text-align:center}
.stb:hover{border-color:var(--tx2)}
.stb.on.slow{border-color:#58a6ff;background:rgba(88,166,255,.12);color:#58a6ff}
.stb.on.normal{border-color:#3fb950;background:rgba(63,185,80,.12);color:#3fb950}
.stb.on.aggressive{border-color:#f85149;background:rgba(248,81,73,.12);color:#f85149}
.inf{font-size:.7rem;color:var(--tx2);line-height:1.5}
.inf p{margin-bottom:4px}
.inf strong{color:var(--tx)}
</style>
</head>
<body>
<div class="h"><div class="hc"><div class="l"><div class="li">🚗</div><div class="lt"><div class="ttl">微观交通流仿真系统</div><div class="sub">Microscopic Traffic Simulation</div></div></div><div class="rt">模型：<b>IDM + MOBIL</b></div></div></div>
<div class="m">
<div class="s1"><div class="cw"><canvas id="c" width="800" height="550"></canvas>
<div class="hud"><div class="hu"><div class="hl">平均速度</div><div class="hv" id="avgS">0 km/h</div></div><div class="hu"><div class="hl">密度</div><div class="hv" id="den">0</div></div><div class="hu"><div class="hl">拥堵</div><div class="hv" id="jam">0%</div></div></div>
<div class="tm">⏱ <span id="tm">00:00</span></div></div>
<div class="cb"><div class="bg"><button class="b bp" id="sB">▶</button><button class="b bs" id="pB" disabled>⏸</button><button class="b br" id="rB">↺</button></div><div class="lg"><div class="li"><div class="ld" style="background:#58a6ff"></div>保守</div><div class="li"><div class="ld" style="background:#3fb950"></div>正常</div><div class="li"><div class="ld" style="background:#f85149"></div>激进</div></div></div></div>
<div class="s2">
<div class="p"><div class="ph">⚙️ 参数</div><div class="pc"><div class="cg"><div class="cl"><span>车辆数</span><span class="cv" id="ccV">20</span></div><input type="range" id="cc" min="5" max="50" value="20"></div><div class="cg"><div class="cl"><span>限速 km/h</span><span class="cv" id="slV">120</span></div><input type="range" id="sl" min="60" max="180" value="120"></div><div class="cg"><div class="cl"><span>视距</span><span class="cv" id="zsV">100%</span></div><input type="range" id="zs" min="60" max="140" value="100"></div></div></div>
<div class="p sp" id="selP"><div class="ph">🚙 选中车辆</div><div class="pc"><div class="sg"><div class="sb"><div class="sv" id="vSpd">0</div><div class="sl">km/h</div></div><div class="sb"><div class="sv" id="vAcc">0</div><div class="sl">m/s²</div></div></div><div class="cg" style="margin-top:10px"><div class="cl"><span>期望速度</span><span class="cv" id="tsV">110</span></div><input type="range" id="ts" min="40" max="200" value="110"></div><div class="cg"><div class="cl"><span>安全车距</span><span class="cv" id="fdV">50</span></div><input type="range" id="fd" min="20" max="100" value="50"></div><div class="cl">风格</div><div class="st"><button class="stb slow" data-st="slow">🐢</button><button class="stb normal on" data-st="normal">🚗</button><button class="stb aggressive" data-st="aggressive">🏎️</button></div></div></div>
<div class="p"><div class="ph">📊 统计</div><div class="pc"><div class="sg"><div class="sb"><div class="sv" id="tv">0</div><div class="sl">车辆</div></div><div class="sb"><div class="sv" id="fr">0</div><div class="sl">流量</div></div><div class="sb"><div class="sv" id="lc">0</div><div class="sl">变道</div></div><div class="sb"><div class="sv" id="eb">0</div><div class="sl">急刹</div></div><div class="sb"><div class="sv" id="el">0</div><div class="sl">能耗</div></div></div></div></div>
<div class="p"><div class="ph">🚗 车辆</div><div class="pc" style="padding:8px"><div class="vs" id="vl"></div></div></div>
<div class="p"><div class="ph">📖 模型</div><div class="pc"><div class="inf"><p><strong>IDM</strong> 智能驾驶员模型</p><p><strong>MOBIL</strong> 变道决策</p><p style="color:var(--c4)">💡 滚动道路查看前后车</p><p style="color:var(--c4)">💡 点击控制车辆</p></div></div></div>
</div></div>
<script>
const IP={slow:{v0:70,T:2,s0:4,a:.5,b:1.5,c:'#58a6ff',n:'保守',p:.002},normal:{v0:110,T:1.5,s0:2.5,a:.8,b:2,c:'#3fb950',n:'正常',p:.006},aggressive:{v0:160,T:.8,s0:1.2,a:1.3,b:3.5,c:'#f85149',n:'激进',p:.02}};
const C=document.getElementById('c'),X=C.getContext('2d');
const CWEl=document.querySelector('.cw');
const R={L:4,W:19.6,Rl:1000,Sc:4,Vl:20.5,Vw:9};
let Z=1;
const G={g:9.81,mu:.85};
let CW=800,CH=550;
const rd={l:()=>Math.max(70,(CW-R.L*R.W*R.Sc)/2),t:()=>35,w:()=>R.L*R.W*R.Sc,h:()=>R.Rl*R.Sc};
function lx(l){return rd.l()+(l+.5)*R.W*R.Sc}
class Veh{constructor(i,po,l,st='normal'){this.i=i;this.po=po;this.l=l;this.st=st;this.pr={...IP[st]};this.sp=this.pr.v0/3.6*(.4+Math.random()*.4);this.ac=0;this.chg=0;this.tL=l;this.br=0;this.lc=0;this.em=0;this.le=0;this.out=0}
ap(fv,sl){const v=this.sp,v0=Math.min(this.pr.v0/3.6,sl),a=this.pr.a,b=this.pr.b,s0=this.pr.s0,T=this.pr.T;
 let s=fv?(fv.po-this.po-R.Vl)*R.Sc:Infinity;
 const fa=a*(1-Math.pow(v/v0,4)),dv=v-(fv?fv.sp:v),sS=s0+Math.max(0,v*T+v*dv/(2*Math.sqrt(a*b))),ba=-a*Math.pow(sS/Math.max(s,s0),2);
 this.ac=fa+ba;
 const amax=G.mu*G.g;this.ac=Math.max(-amax,Math.min(this.ac,amax));
 if(s<s0*.4){this.em++;this.br=1}else this.br=this.ac<-.8;
 this.sp=Math.max(0,Math.min(this.sp+this.ac*.05,v0))}
ff(vs){let cl=null,cd=Infinity;
for(let o of vs){if(o.i===this.i)continue;if(o.l!==this.l&&(!o.chg||o.tL!==this.l))continue;
if(o.po>this.po){const d=o.po-this.po-R.Vl;if(d<cd){cd=d;cl=o}}}return cl}
cCL(vs,tl){const sd=Math.max(this.sp*1.2,12);
for(let o of vs){if(o.i===this.i)continue;if(o.l!==tl&&(!o.chg||o.tL!==tl))continue;if(Math.abs(o.po-this.po)<sd)return 0}return 1}
dl(vs){if(Math.random()>this.pr.p)return;const fv=this.ff(vs);if(!fv)return;const gap=(fv.po-this.po-R.Vl)*R.Sc;if(gap<this.pr.s0*2){for(let d of[-1,1]){const tl=this.l+d;if(tl<0||tl>=R.L)continue;if(this.cCL(vs,tl)){this.chg=1;this.tL=tl;this.lc++;return}}}}
up(vs,sl){if(this.chg){this.chg+=.12;this.ac=-.4;if(this.chg>=1){this.l=this.tL;this.chg=0}}else{this.ap(this.ff(vs),sl);this.dl(vs)}
 this.le=this.ac*R.Vl*this.sp;
 this.po+=this.sp*.05;if(this.po>R.Rl)this.out=1}
dr(){let dx=lx(this.l);if(this.chg)dx=lx(this.l)+(lx(this.tL)-lx(this.l))*this.chg;
 const dy=rd.t()+this.po*R.Sc,w=R.Vw*R.Sc,h=R.Vl*R.Sc;
 X.save();
 X.shadowColor='rgba(0,0,0,.5)';X.shadowBlur=14;X.shadowOffsetY=7;
 const body=X.createLinearGradient(dx-w/2,dy-h/2,dx+w/2,dy+h/2);body.addColorStop(0,'rgba(255,255,255,.12)');body.addColorStop(.2,this.pr.c);body.addColorStop(1,'rgba(0,0,0,.28)');
 X.fillStyle=body;X.beginPath();rR(X,dx-w/2,dy-h/2,w,h,8);X.fill();
 X.shadowBlur=0;
 X.fillStyle='rgba(10,14,20,.8)';X.fillRect(dx-w/2+.08*w,dy-h/2+.08*h,w*.84,h*.28);
 X.fillStyle='rgba(255,255,255,.2)';X.fillRect(dx-w/2+.12*w,dy-h/2+.12*h,w*.26,h*.12);
 X.fillStyle='rgba(255,255,255,.14)';X.fillRect(dx-w/2+.62*w,dy-h/2+.12*h,w*.18,h*.12);
 const hi=X.createLinearGradient(dx-w/2,dy-h/2,dx+w/2,dy-h/2);hi.addColorStop(0,'rgba(255,255,255,.18)');hi.addColorStop(.5,'rgba(255,255,255,0)');hi.addColorStop(1,'rgba(0,0,0,.2)');X.fillStyle=hi;X.fillRect(dx-w/2,dy-h/2,w,h*.18);
 X.fillStyle=this.br?'#ff3b30':'#5b0b0b';if(this.br){X.shadowColor='#ff3b30';X.shadowBlur=10}X.fillRect(dx-w/2+.06*w,dy+h/2-.1*h,.18*w,.06*h);X.fillRect(dx+w/2-.24*w,dy+h/2-.1*h,.18*w,.06*h);X.shadowBlur=0;
 X.fillStyle='#1a1a1a';const tw=.14*w,th=.5*h;X.fillRect(dx-w/2-tw*.06,dy-h/2+.12*h,tw,th);X.fillRect(dx+w/2-tw*.94,dy-h/2+.12*h,tw,th);X.fillRect(dx-w/2-tw*.06,dy+h/2-th-.12*h,tw,th);X.fillRect(dx+w/2-tw*.94,dy+h/2-th-.12*h,tw,th);
 X.fillStyle='rgba(255,255,255,.1)';X.fillRect(dx-w/2+.1*w,dy-h/2+.4*h,w*.8,h*.04);
 if(this.i===sid){X.strokeStyle='rgba(14,165,233,.9)';X.lineWidth=2.2;X.shadowColor='rgba(14,165,233,.8)';X.shadowBlur=12;X.strokeRect(dx-w/2-2,dy-h/2-2,w+4,h+4);X.shadowBlur=0}
 X.fillStyle='rgba(0,0,0,.45)';X.fillRect(dx-w/2+.34*w,dy-h/2+.36*h,w*.32,h*.22);
 X.fillStyle='rgba(255,255,255,.92)';X.font='bold 12px "JetBrains Mono",monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(this.i,dx,dy-h*.02);
 X.restore()}}
function rR(x,y,w,h,r){x.moveTo(x+r,y);x.lineTo(x+w-r,y);x.quadraticCurveTo(x+w,y,x+w,y+r);x.lineTo(x+w,y+h-r);x.quadraticCurveTo(x+w,y+h,x+w-r,y+h);x.lineTo(x+r,y+h);x.quadraticCurveTo(x,y+h,x,y+h-r);x.lineTo(x,y+r);x.quadraticCurveTo(x,y,x+r,y)}
let vs=[],sid=null,run=0,sti=0;
let vmap=new Map();
function fit(){const s=Math.min(C.clientWidth/C.width,C.clientHeight/C.height);R.Sc=Math.max(3.6,s*3.9)*Z;C.width=C.clientWidth;CW=C.width;CH=R.Rl*R.Sc;C.height=CH;C.style.height=CH+'px'}
function init(){fit();vs=[];for(let i=0;i<parseInt(document.getElementById('cc').value);i++){const l=Math.floor(Math.random()*R.L),po=Math.random()*R.Rl,st=Math.random()<.25?'slow':Math.random()<.85?'normal':'aggressive';vs.push(new Veh(i+1,po,l,st))}buildList();upL()}
function drRd(){const x=rd.l(),y=rd.t(),w=rd.w(),h=rd.h();
 const bg=X.createLinearGradient(x,y,x,y+h);bg.addColorStop(0,'#141b24');bg.addColorStop(.5,'#121923');bg.addColorStop(1,'#0f151d');X.fillStyle=bg;X.fillRect(x,y,w,h);
 X.fillStyle='rgba(255,255,255,.04)';for(let i=0;i<10;i++){X.fillRect(x,y+i*h/10,w,1)}
 X.strokeStyle='rgba(251,191,36,.85)';X.setLineDash([18,12]);X.lineWidth=1.5;for(let i=1;i<R.L;i++){X.beginPath();X.moveTo(x+i*R.W*R.Sc,y);X.lineTo(x+i*R.W*R.Sc,y+h);X.stroke()}
 X.setLineDash([]);X.strokeStyle='rgba(249,115,22,.9)';X.lineWidth=2.5;X.beginPath();X.moveTo(x,y);X.lineTo(x,y+h);X.moveTo(x+w,y);X.lineTo(x+w,y+h);X.stroke();
 X.fillStyle='rgba(255,255,255,.18)';X.font='9px monospace';for(let i=0;i<R.L;i++){X.fillText('L'+(i+1),x-20,y+(i+.5)*R.W*R.Sc+3)}}
function upSt(){let ts=0,sp=0,le=0;for(let v of vs){ts+=v.sp;if(v.sp<1)sp++;le+=v.le}
 const avs=vs.length?Math.round(ts/vs.length*3.6):0,den=vs.length?Math.round(vs.length/(R.Rl/1000)/(R.L*R.W)):0,jam=vs.length?Math.round(sp/vs.length*100):0,loss=Math.max(0,Math.round(le/vs.length/1000));
const avEl=document.getElementById('avgS');avEl.textContent=avs+' km/h';avEl.className='hv'+(jam>50?' d':jam>30?' w':'');
document.getElementById('den').textContent=den;const jamEl=document.getElementById('jam');jamEl.textContent=jam+'%';jamEl.className='hv'+(jam>50?' d':jam>30?' w':'');
 document.getElementById('tv').textContent=vs.length;document.getElementById('fr').textContent=Math.round(avs*den);document.getElementById('lc').textContent=vs.reduce((a,v)=>a+v.lc,0);document.getElementById('eb').textContent=vs.reduce((a,v)=>a+v.em,0);document.getElementById('el').textContent=loss;
