<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实驾驶模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-content {
            display: flex;
            gap: 20px;
        }
        .canvas-container {
            flex: 1;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        #canvas {
            display: block;
            background: #1a1a2e;
        }
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
        }
        .panel h3 {
            font-size: 1em;
            margin-bottom: 12px;
            color: #00d9ff;
        }
        .car-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .car-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .car-item:hover {
            background: rgba(0,0,0,0.5);
        }
        .car-item.selected {
            border: 2px solid #00d9ff;
        }
        .car-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        .car-info {
            flex: 1;
            font-size: 0.85em;
        }
        .car-style {
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.2);
        }
        .style-slow { background: #3498db; }
        .style-normal { background: #27ae60; }
        .style-aggressive { background: #e74c3c; }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-start { background: #00d9ff; color: #000; }
        .btn-stop { background: #ff6b6b; color: #fff; }
        .btn-reset { background: #ffa502; color: #fff; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .slider-group {
            margin-bottom: 12px;
        }
        .slider-group label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        .slider-group input[type="range"] {
            width: 100%;
        }
        
        .selected-car-panel {
            display: none;
        }
        .selected-car-panel.active {
            display: block;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-label {
            font-size: 0.75em;
            color: #aaa;
        }
        
        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.8em;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .driving-style-selector {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .style-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8em;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: #fff;
            transition: all 0.2s;
        }
        .style-btn:hover { border-color: rgba(255,255,255,0.5); }
        .style-btn.active.slow { background: #3498db; }
        .style-btn.active.normal { background: #27ae60; }
        .style-btn.active.aggressive { background: #e74c3c; }
        
        .info-panel {
            font-size: 0.85em;
            line-height: 1.6;
        }
        .info-panel p { margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 真实驾驶模拟器</h1>
        
        <div class="main-content">
            <div class="canvas-container">
                <canvas id="canvas" width="600" height="700"></canvas>
            </div>
            
            <div class="sidebar">
                <div class="panel">
                    <h3>🎮 控制面板</h3>
                    <div class="slider-group">
                        <label>车辆数量: <span id="carCountVal">20</span></label>
                        <input type="range" id="carCount" min="5" max="50" value="20">
                    </div>
                    <div class="slider-group">
                        <label>道路限速: <span id="speedLimitVal">120</span> km/h</label>
                        <input type="range" id="speedLimit" min="60" max="200" value="120">
                    </div>
                    <div class="controls">
                        <button class="btn-start" id="startBtn">开始</button>
                        <button class="btn-stop" id="stopBtn" disabled>暂停</button>
                        <button class="btn-reset" id="resetBtn">重置</button>
                    </div>
                </div>
                
                <div class="panel selected-car-panel" id="selectedPanel">
                    <h3>🚙 选中车辆控制</h3>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value" id="carSpeed">0</div>
                            <div class="stat-label">当前速度</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="carLane">1</div>
                            <div class="stat-label">车道</div>
                        </div>
                    </div>
                    <div class="slider-group" style="margin-top: 12px;">
                        <label>目标速度: <span id="targetSpeedVal">100</span> km/h</label>
                        <input type="range" id="targetSpeed" min="20" max="200" value="100">
                    </div>
                    <div class="slider-group">
                        <label>跟车距离: <span id="followDistVal">50</span> m</label>
                        <input type="range" id="followDist" min="20" max="100" value="50">
                    </div>
                    <label>驾驶风格:</label>
                    <div class="driving-style-selector">
                        <button class="style-btn slow" data-style="slow">🐢 保守</button>
                        <button class="style-btn normal" data-style="normal">🚗 正常</button>
                        <button class="style-btn aggressive" data-style="aggressive">🏎️ 激进</button>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>📊 全局统计</h3>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value" id="avgSpeed">0</div>
                            <div class="stat-label">平均速度</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="jamLevel">0%</div>
                            <div class="stat-label">拥堵指数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="laneChanges">0</div>
                            <div class="stat-label">变道次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="overtakes">0</div>
                            <div class="stat-label">超车次数</div>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>🚗 车辆列表</h3>
                    <div class="legend">
                        <div class="legend-item"><div class="legend-color" style="background: #3498db;"></div>保守</div>
                        <div class="legend-item"><div class="legend-color" style="background: #27ae60;"></div>正常</div>
                        <div class="legend-item"><div class="legend-color" style="background: #e74c3c;"></div>激进</div>
                    </div>
                    <div class="car-list" id="carList"></div>
                </div>
                
                <div class="panel">
                    <h3>ℹ️ 说明</h3>
                    <div class="info-panel">
                        <p>• <strong>保守司机</strong>: 保持远跟车距离，低速行驶，很少变道</p>
                        <p>• <strong>正常司机</strong>: 适中跟车距离，适度变道</p>
                        <p>• <strong>激进司机</strong>: 近距离跟车，高速行驶，频繁变道超车</p>
                        <p>• 点击左侧车辆可单独控制</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 驾驶风格配置
        const DRIVING_STYLES = {
            slow: {
                name: '保守',
                color: '#3498db',
                minFollowDist: 60,
                maxFollowDist: 100,
                maxSpeed: 80,
                laneChangeProb: 0.002,
                overtaking: false
            },
            normal: {
                name: '正常',
                color: '#27ae60',
                minFollowDist: 40,
                maxFollowDist: 70,
                maxSpeed: 120,
                laneChangeProb: 0.005,
                overtaking: true
            },
            aggressive: {
                name: '激进',
                color: '#e74c3c',
                minFollowDist: 25,
                maxFollowDist: 45,
                maxSpeed: 180,
                laneChangeProb: 0.015,
                overtaking: true
            }
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 道路配置 - 垂直方向
        const road = {
            x: 100,
            y: 50,
            width: 400,
            height: 600,
            lanes: 4,
            laneHeight: 0
        };
        road.laneHeight = road.height / road.lanes;

        // 车辆类
        class Car {
            constructor(id, y, lane, style = 'normal') {
                this.id = id;
                this.x = road.x + 30 + Math.random() * (road.width - 60);
                this.y = y;
                this.lane = lane;
                this.width = 24;
                this.height = 40;
                
                // 驾驶偏好
                this.style = style;
                this.styleConfig = DRIVING_STYLES[style];
                
                // 速度相关 (pixels/frame，转换为显示用)
                this.speed = 0;
                this.targetSpeed = this.styleConfig.maxSpeed * 0.7 + Math.random() * this.styleConfig.maxSpeed * 0.3;
                this.followDist = this.styleConfig.minFollowDist + Math.random() * (this.styleConfig.maxFollowDist - this.styleConfig.minFollowDist);
                
                // 状态
                this.accelerating = false;
                this.braking = false;
                this.changingLane = false;
                this.laneChangeProgress = 0;
                this.targetLane = lane;
                this.laneChangeSpeed = 0.03;
                
                // 统计
                this.laneChanges = 0;
                this.overtakes = 0;
                this.totalDistance = 0;
                
                // AI决策
                this.reactionTime = 0.3 + Math.random() * 0.5; // 反应时间(秒)
                this.lastDecision = 0;
            }
            
            // 获取目标车道的位置
            getLaneX(lane) {
                return road.x + (lane + 0.5) * road.laneHeight;
            }
            
            // 决策逻辑
            decide(cars, currentTime) {
                if (currentTime - this.lastDecision < this.reactionTime) return;
                this.lastDecision = currentTime;
                
                // 找前车
                const frontCar = this.findFrontCar(cars);
                const frontDist = frontCar ? frontCar.y - this.y - this.height : Infinity;
                
                // 激进司机：前方受阻时尝试变道
                if (this.styleConfig.overtaking && frontCar && frontDist < this.followDist * 0.6) {
                    if (Math.random() < this.styleConfig.laneChangeProb * 5) {
                        this.tryChangeLane(cars, 'left');
                    }
                }
                
                // 正常变道需求
                if (!this.changingLane && Math.random() < this.styleConfig.laneChangeProb) {
                    const randomLane = Math.random() < 0.5 ? 'left' : 'right';
                    this.tryChangeLane(cars, randomLane);
                }
            }
            
            // 找前车
            findFrontCar(cars) {
                let closest = null;
                let closestDist = Infinity;
                
                for (let other of cars) {
                    if (other.id === this.id) continue;
                    if (other.lane !== this.lane && (!other.changingLane || other.targetLane !== this.lane)) continue;
                    
                    if (other.y > this.y) {
                        let dist = other.y - this.y - this.height;
                        if (dist < closestDist) {
                            closestDist = dist;
                            closest = other;
                        }
                    }
                }
                return closest;
            }
            
            // 找相邻车道
            findAdjacentLane(laneDir) {
                const targetLane = this.lane + (laneDir === 'left' ? -1 : 1);
                if (targetLane < 0 || targetLane >= road.lanes) return null;
                return targetLane;
            }
            
            // 检查变道是否安全
            canChangeLane(cars, targetLane) {
                const targetY = this.y;
                const safetyMargin = this.height * 2;
                
                for (let other of cars) {
                    if (other.id === this.id) continue;
                    if (other.lane !== targetLane && (!other.changingLane || other.targetLane !== targetLane)) continue;
                    
                    // 检查目标位置是否有车
                    if (Math.abs(other.y - targetY) < safetyMargin) {
                        return false;
                    }
                }
                return true;
            }
            
            // 尝试变道
            tryChangeLane(cars, direction) {
                const targetLane = this.findAdjacentLane(direction);
                if (targetLane === null) return;
                
                if (this.canChangeLane(cars, targetLane)) {
                    this.changingLane = true;
                    this.targetLane = targetLane;
                    this.laneChangeProgress = 0;
                    this.laneChangeSpeed = 0.02 + Math.random() * 0.02;
                }
            }
            
            // 更新状态
            update(cars, speedLimit) {
                // 变道逻辑
                if (this.changingLane) {
                    this.laneChangeProgress += this.laneChangeSpeed;
                    
                    if (this.laneChangeProgress >= 1) {
                        this.lane = this.targetLane;
                        this.changingLane = false;
                        this.laneChangeProgress = 0;
                        this.laneChanges++;
                    }
                }
                
                // 速度调整
                const frontCar = this.findFrontCar(cars);
                const frontDist = frontCar ? frontCar.y - this.y - this.height : Infinity;
                
                const effectiveMaxSpeed = Math.min(this.targetSpeed, speedLimit, this.styleConfig.maxSpeed);
                
                if (frontCar && frontDist < this.followDist) {
                    // 前方有车，跟随前车速度
                    const targetFollowSpeed = frontCar.speed * 0.9;
                    this.speed += (targetFollowSpeed - this.speed) * 0.1;
                    this.braking = true;
                    this.accelerating = false;
                    
                    // 距离太近时急刹车
                    if (frontDist < this.followDist * 0.3) {
                        this.speed *= 0.9;
                    }
                } else {
                    // 加速到目标速度
                    if (this.speed < effectiveMaxSpeed) {
                        this.speed += (effectiveMaxSpeed - this.speed) * 0.05;
                        this.accelerating = true;
                    } else {
                        this.accelerating = false;
                    }
                    this.braking = false;
                }
                
                // 变道时减速
                if (this.changingLane) {
                    this.speed *= 0.98;
                }
                
                // 移动 (垂直向下)
                this.y += this.speed;
                this.totalDistance += this.speed;
                
                // 循环
                if (this.y > road.y + road.height) {
                    this.y = road.y - this.height;
                    // 重新随机变道
                    if (Math.random() < 0.3) {
                        const dir = Math.random() < 0.5 ? 'left' : 'right';
                        const target = this.findAdjacentLane(dir);
                        if (target !== null) {
                            this.changingLane = true;
                            this.targetLane = target;
                            this.laneChangeProgress = 0;
                        }
                    }
                }
                
                // 超车计数
                if (frontCar && this.y > frontCar.y && this.y - frontCar.y < this.height) {
                    // 刚超过前车
                }
            }
            
            // 绘制
            draw() {
                ctx.save();
                
                // 计算实际x位置
                let drawX;
                if (this.changingLane) {
                    const startX = this.getLaneX(this.lane);
                    const endX = this.getLaneX(this.targetLane);
                    drawX = startX + (endX - startX) * this.laneChangeProgress;
                } else {
                    drawX = this.getLaneX(this.lane);
                }
                
                drawX -= this.width / 2;
                
                // 变道时稍微倾斜
                if (this.changingLane) {
                    const tilt = (this.targetLane - this.lane) * 0.1;
                    ctx.translate(drawX + this.width/2, this.y + this.height/2);
                    ctx.rotate(tilt);
                    ctx.translate(-(drawX + this.width/2), -(this.y + this.height/2));
                }
                
                // 车身阴影
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;
                
                // 车身
                ctx.fillStyle = this.styleConfig.color;
                ctx.beginPath();
                ctx.roundRect(drawX, this.y, this.width, this.height, 5);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                
                // 车窗
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(drawX + 3, this.y + 5, this.width - 6, 12);
                
                // 尾灯
                if (this.braking) {
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 15;
                } else {
                    ctx.fillStyle = '#880000';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(drawX + 2, this.y + this.height - 4, 4, 3);
                ctx.fillRect(drawX + this.width - 6, this.y + this.height - 4, 4, 3);
                
                // 头灯
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = this.accelerating ? 10 : 5;
                ctx.fillRect(drawX + 2, this.y + 1, 4, 3);
                ctx.fillRect(drawX + this.width - 6, this.y + 1, 4, 3);
                
                // ID标签
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.id, drawX + this.width/2, this.y + this.height/2 + 4);
                
                ctx.restore();
            }
        }

        // 全局变量
        let cars = [];
        let selectedCarId = null;
        let isRunning = false;
        let animationId = null;
        let totalLaneChanges = 0;
        let lastTime = 0;

        // 初始化
        function initCars() {
            cars = [];
            const count = parseInt(document.getElementById('carCount').value);
            
            const styles = ['slow', 'normal', 'aggressive'];
            const styleWeights = [0.2, 0.6, 0.2]; // 20%保守, 60%正常, 20%激进
            
            for (let i = 0; i < count; i++) {
                const lane = Math.floor(Math.random() * road.lanes);
                const y = road.y + Math.random() * road.height;
                
                // 根据权重随机选择风格
                const rand = Math.random();
                let style;
                if (rand < styleWeights[0]) style = styles[0];
                else if (rand < styleWeights[0] + styleWeights[1]) style = styles[1];
                else style = styles[2];
                
                cars.push(new Car(i + 1, y, lane, style));
            }
            
            totalLaneChanges = 0;
            updateCarList();
        }

        // 绘制道路
        function drawRoad() {
            // 路面
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(road.x, road.y, road.width, road.height);
            
            // 车道线
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([30, 20]);
            ctx.lineWidth = 2;
            
            for (let i = 1; i < road.lanes; i++) {
                const y = road.y + i * road.laneHeight;
                ctx.beginPath();
                ctx.moveTo(road.x, y);
                ctx.lineTo(road.x + road.width, y);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
            
            // 路边
            ctx.strokeStyle = '#f39c12';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(road.x, road.y);
            ctx.lineTo(road.x + road.width, road.y);
            ctx.moveTo(road.x, road.y + road.height);
            ctx.lineTo(road.x + road.width, road.y + road.height);
            ctx.stroke();
            
            // 车道编号
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '12px Arial';
            for (let i = 0; i < road.lanes; i++) {
                const y = road.y + (i + 0.5) * road.laneHeight;
                ctx.fillText(`Lane ${i + 1}`, road.x + road.width + 10, y + 4);
            }
        }

        // 更新统计
        function updateStats() {
            let totalSpeed = 0;
            let stopped = 0;
            
            for (let car of cars) {
                totalSpeed += car.speed;
                if (car.speed < 1) stopped++;
            }
            
            const avgSpeed = cars.length > 0 ? Math.round(totalSpeed / cars.length * 3.6) : 0;
            const jamLevel = cars.length > 0 ? Math.round((stopped / cars.length) * 100) : 0;
            
            document.getElementById('avgSpeed').textContent = avgSpeed;
            document.getElementById('jamLevel').textContent = jamLevel + '%';
            document.getElementById('laneChanges').textContent = totalLaneChanges;
            document.getElementById('overtakes').textContent = Math.floor(totalLaneChanges * 0.7);
            
            // 更新选中车辆信息
            if (selectedCarId !== null) {
                const car = cars.find(c => c.id === selectedCarId);
                if (car) {
                    document.getElementById('carSpeed').textContent = Math.round(car.speed * 3.6);
                    document.getElementById('carLane').textContent = car.lane + 1;
                }
            }
        }

        // 更新车辆列表
        function updateCarList() {
            const listEl = document.getElementById('carList');
            listEl.innerHTML = '';
            
            for (let car of cars) {
                const item = document.createElement('div');
                item.className = 'car-item' + (car.id === selectedCarId ? ' selected' : '');
                item.innerHTML = `
                    <div class="car-icon" style="background: ${car.styleConfig.color};"></div>
                    <div class="car-info">
                        <div>车辆 #${car.id}</div>
                        <div style="color: #888;">${Math.round(car.speed * 3.6)} km/h</div>
                    </div>
                    <span class="car-style style-${car.style}">${car.styleConfig.name}</span>
                `;
                item.onclick = () => selectCar(car.id);
                listEl.appendChild(item);
            }
        }

        // 选择车辆
        function selectCar(id) {
            selectedCarId = id;
            const car = cars.find(c => c.id === id);
            
            if (car) {
                document.getElementById('selectedPanel').classList.add('active');
                document.getElementById('targetSpeed').value = car.targetSpeed;
                document.getElementById('targetSpeedVal').textContent = Math.round(car.targetSpeed);
                document.getElementById('followDist').value = car.followDist;
                document.getElementById('followDistVal').textContent = Math.round(car.followDist);
                
                // 更新风格按钮
                document.querySelectorAll('.style-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.style === car.style);
                });
            }
            
            updateCarList();
        }

        // 动画循环
        function animate(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            
            // 更新和绘制
            const speedLimit = parseInt(document.getElementById('speedLimit').value) / 3.6;
            
            for (let car of cars) {
                if (isRunning) {
                    // AI决策
                    if (car.id === selectedCarId) {
                        // 选中的车辆使用手动控制的速度
                    } else {
                        car.decide(cars, currentTime / 1000);
                    }
                    car.update(cars, speedLimit);
                }
                car.draw();
            }
            
            // 统计变道次数
            totalLaneChanges = cars.reduce((sum, car) => sum + car.laneChanges, 0);
            
            updateStats();
            
            if (selectedCarId && isRunning) {
                updateCarList();
            }
            
            animationId = requestAnimationFrame(animate);
        }

        // 事件监听
        document.getElementById('carCount').addEventListener('input', function() {
            document.getElementById('carCountVal').textContent = this.value;
            if (!isRunning) initCars();
        });
        
        document.getElementById('speedLimit').addEventListener('input', function() {
            document.getElementById('speedLimitVal').textContent = this.value;
        });
        
        document.getElementById('targetSpeed').addEventListener('input', function() {
            document.getElementById('targetSpeedVal').textContent = this.value;
            const car = cars.find(c => c.id === selectedCarId);
            if (car) car.targetSpeed = parseInt(this.value);
        });
        
        document.getElementById('followDist').addEventListener('input', function() {
            document.getElementById('followDistVal').textContent = this.value;
            const car = cars.find(c => c.id === selectedCarId);
            if (car) car.followDist = parseInt(this.value);
        });
        
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const style = this.dataset.style;
                const car = cars.find(c => c.id === selectedCarId);
                if (car) {
                    car.style = style;
                    car.styleConfig = DRIVING_STYLES[style];
                    car.followDist = car.styleConfig.minFollowDist + Math.random() * (car.styleConfig.maxFollowDist - car.styleConfig.minFollowDist);
                    car.targetSpeed = car.styleConfig.maxSpeed * 0.8;
                    document.getElementById('followDist').value = car.followDist;
                    document.getElementById('followDistVal').textContent = Math.round(car.followDist);
                    document.getElementById('targetSpeed').value = car.targetSpeed;
                    document.getElementById('targetSpeedVal').textContent = Math.round(car.targetSpeed);
                }
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateCarList();
            });
        });
        
        document.getElementById('startBtn').addEventListener('click', function() {
            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        });
        
        document.getElementById('stopBtn').addEventListener('click', function() {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        });
        
        document.getElementById('resetBtn').addEventListener('click', function() {
            initCars();
            selectedCarId = null;
            document.getElementById('selectedPanel').classList.remove('active');
        });

        // 启动
        initCars();
        animate(0);
    </script>
</body>
</html>
